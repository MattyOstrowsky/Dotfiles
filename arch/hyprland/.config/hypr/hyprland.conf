# =============================================================================
# Hyprland Config — Huawei MateBook VGHH-XX + Noctalia Shell
# =============================================================================
# Read the full wiki: https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# ── Monitors ─────────────────────────────────────────────────────────────────
# Auto-detect. To override, uncomment:
# monitor=eDP-1,2880x1920@90,0x0,1.5

# ── Startup ──────────────────────────────────────────────────────────────────

# Noctalia shell (bar, panel, launcher, notifications)
exec-once = qs -c noctalia-shell

# Authentication agent (required for polkit dialogs)
exec-once = /usr/libexec/hyprpolkitagent

# Apply GTK theme for consistent look
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark

# ── Noctalia IPC shortcut ───────────────────────────────────────────────────
$ipc = qs -c noctalia-shell ipc call

# ── XWayland ─────────────────────────────────────────────────────────────────
# Force XWayland to see native resolution instead of scaled-down one.
# Fixes Steam (Flatpak) games being limited to ~1500x900 on scaled displays.
xwayland {
    force_zero_scaling = true
}

# ── Environment ──────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11

# ── General ──────────────────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(61afeFee) rgba(56b6c2ee) 45deg
    col.inactive_border = rgba(5c6370aa)
    layout = dwindle
    allow_tearing = false
}

# ── Decoration — Noctalia recommended settings ──────────────────────────────
decoration {
    rounding = 20
    rounding_power = 2

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# ── Noctalia layer rules (blur + transparency) ──────────────────────────────
# Docs: https://docs.noctalia.dev/v4/getting-started/compositor-settings/hyprland/
layerrule {
    name = noctalia
    match:namespace = noctalia-background-.*$
    ignore_alpha = 0.5
    blur = true
    blur_popups = true
}

# ── Animations ───────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout = pl
    kb_options = caps:escape

    follow_mouse = 1
    sensitivity = 0  # -1.0 to 1.0, 0 = default

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
    }
}

# ── Window Rules ─────────────────────────────────────────────────────────────
# Float某些 apps by default
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Picture-in-Picture)$

# Pin certain windows to all workspaces
windowrulev2 = pin, title:^(Picture-in-Picture)$

# ── Keybinds ─────────────────────────────────────────────────────────────────
# Mod key: SUPER (Windows key)
$mainMod = SUPER

# ── Launch apps ──────────────────────────────────────────────────────────────
bind = $mainMod, Return, exec, ghostty
bind = $mainMod, B, exec, firefox
bind = $mainMod, N, exec, nautilus
bind = $mainMod, slash, exec, ~/.local/bin/cheatsheet

# ── Window management ────────────────────────────────────────────────────────
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,  # dwindle

# ── Navigation (vim-style) ───────────────────────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces with mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Noctalia keybinds ────────────────────────────────────────────────────────
bind = $mainMod, SPACE, exec, $ipc launcher toggle
bind = $mainMod, S, exec, $ipc controlCenter toggle
bind = $mainMod, comma, exec, $ipc settings toggle

# ── Media keys (routed through Noctalia) ────────────────────────────────────
binde = , XF86AudioRaiseVolume, exec, $ipc volume increase
binde = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
binde = , XF86MonBrightnessUp, exec, $ipc brightness increase
binde = , XF86MonBrightnessDown, exec, $ipc brightness decrease

# ── Screenshot ───────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy

source = /home/mat/.config/hypr/noctalia/noctalia-colors.conf

