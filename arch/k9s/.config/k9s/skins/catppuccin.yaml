# k9s Catppuccin Mocha skin
# Based on: https://github.com/catppuccin/catppuccin
# Palette: https://catppuccin.com/palette
#
# Base:     #1e1e2e   Text:     #cdd6f4
# Surface0: #313244   Subtext0: #a6adc8
# Surface1: #45475a   Overlay0: #6c7086
# Mauve:    #cba6f7   Green:    #a6e3a1
# Peach:    #fab387   Yellow:   #f9e2af
# Red:      #f38ba8   Blue:     #89b4fa
# Teal:     #94e2d5   Lavender: #b4befe

k9s:
  body:
    fgColor: "#cdd6f4"
    bgColor: "#1e1e2e"
    logoColor: "#cba6f7"

  info:
    fgColor: "#94e2d5"
    sectionColor: "#89b4fa"

  frame:
    border:
      fgColor: "#6c7086"
      focusColor: "#cba6f7"

    menu:
      fgColor: "#cdd6f4"
      keyColor: "#94e2d5"
      numKeyColor: "#89b4fa"

    crumbs:
      fgColor: "#cdd6f4"
      bgColor: "#313244"
      activeColor: "#cba6f7"

    status:
      newColor: "#a6e3a1"
      modifyColor: "#f9e2af"
      addColor: "#94e2d5"
      errorColor: "#f38ba8"
      highlightColor: "#cba6f7"
      killColor: "#fab387"
      completedColor: "#6c7086"

    title:
      fgColor: "#cdd6f4"
      bgColor: "#313244"
      highlightColor: "#cba6f7"
      counterColor: "#94e2d5"
      filterColor: "#cba6f7"

  views:
    table:
      fgColor: "#cdd6f4"
      bgColor: "#1e1e2e"
      cursorColor: "#cba6f7"
      header:
        fgColor: "#89b4fa"
        bgColor: "#313244"
        sorterColor: "#a6e3a1"

    yaml:
      keyColor: "#94e2d5"
      colonColor: "#6c7086"
      valueColor: "#cdd6f4"

    logs:
      fgColor: "#cdd6f4"
      bgColor: "#1e1e2e"

    charts:
      defaultColor: "#cba6f7"
      dialBgColor: "#313244"
      chartBgColor: "#1e1e2e"

    help:
      fgColor: "#cdd6f4"
      bgColor: "#1e1e2e"
      keyColor: "#94e2d5"
      numKeyColor: "#89b4fa"
      sectionColor: "#cba6f7"
