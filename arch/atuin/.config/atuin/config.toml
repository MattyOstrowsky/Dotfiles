# atuin config
# Path: ~/.config/atuin/config.toml
# Docs: https://docs.atuin.sh

# Filter mode: global (all history), host (this machine only), session (this session)
filter_mode = "host"

# Search mode: fuzzy, skim, skim_tokens
search_mode = "fuzzy"

# Show time in search results
show_time = true

# Show local timezone
timezone = "local"

# Number of items in history list
history_limit = 10000

# Deduplicate history entries
workspace_detection = false
show_preview = true

# Sync settings
# To enable sync:
# 1. atuin register -u <user> -e <email> -p <password>
# 2. atuin login -u <user> -p <password>
# 3. Uncomment:
# sync_frequency = "10m"
# secret_key = ""  # generated by `atuin key`

# Filter by directory
# filter_mode_shell = "directory"

# Enter to execute, Tab to accept search
# enter_accept = false

# Style
style = "compact"

[daemon]
enabled = true
autostart = true

# Keybindings (inside atuin search TUI)
# ctrl+r — toggle search mode (fuzzy / skim)
# ctrl+s — toggle filter mode (global / host / session)
# ctrl+d — delete entry from history
# enter  — paste selected command
# tab    — accept and edit (depending on shell)
