# =============================================================================
# Starship Prompt — DevOps Edition
# =============================================================================
# Docs: https://starship.rs/config/

format = """
[░▒▓](#7b42bc)\
$os\
$username\
[](bg:#3498db fg:#7b42bc)\
$directory\
[](fg:#3498db bg:#2ecc71)\
$git_branch\
$git_status\
$git_metrics\
[](fg:#2ecc71 bg:#e67e22)\
$kubernetes\
$terraform\
$docker_context\
$aws\
$gcloud\
[](fg:#e67e22 bg:#9b59b6)\
$python\
$golang\
$nodejs\
$rust\
$java\
$lua\
[](fg:#9b59b6 bg:#c0392b)\
$cmd_duration\
$status\
[](fg:#c0392b)\
$line_break\
$character"""

# Disable default newline
add_newline = true

# OS icon
[os]
disabled = false
style = "bg:#7b42bc fg:#e0e0e0"
format = "[ $symbol ]($style)"

[os.symbols]
Ubuntu = ""
Linux = "🐧"
Macos = ""
Windows = "󰍲"

# Username
[username]
show_always = true
style_user = "bg:#7b42bc fg:#e0e0e0"
style_root = "bg:#7b42bc fg:#ff6b6b bold"
format = "[$user ]($style)"
disabled = false

# Directory
[directory]
style = "bg:#3498db fg:#e0e0e0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Dotfiles" = "󰒓 "

# =============================================================================
# Git — detailed
# =============================================================================
[git_branch]
symbol = ""
style = "bg:#2ecc71 fg:#1a1a2e"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:#2ecc71 fg:#1a1a2e"
format = "[$all_status$ahead_behind ]($style)"
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = "✓"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_metrics]
disabled = false
added_style = "bg:#2ecc71 fg:#1a1a2e"
deleted_style = "bg:#2ecc71 fg:#1a1a2e"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[git_commit]
style = "bg:#2ecc71 fg:#1a1a2e"
commit_hash_length = 7
tag_symbol = "🏷 "
only_detached = true
format = "[ $hash$tag ]($style)"

# =============================================================================
# DevOps Tools — orange segment
# =============================================================================

# Kubernetes
[kubernetes]
disabled = false
symbol = "⎈"
style = "bg:#e67e22 fg:#1a1a2e"
format = "[ $symbol $context(:$namespace) ]($style)"

[kubernetes.context_aliases]
"arn:aws:eks:*:*:cluster/*" = "$1"

# Terraform
[terraform]
symbol = "💠"
style = "bg:#e67e22 fg:#1a1a2e"
format = "[ $symbol $workspace ]($style)"
detect_files = ["main.tf", "variables.tf", ".terraform"]

# Docker
[docker_context]
symbol = "🐳"
style = "bg:#e67e22 fg:#1a1a2e"
format = "[ $symbol $context ]($style)"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# AWS
[aws]
symbol = "☁️"
style = "bg:#e67e22 fg:#1a1a2e"
format = "[ $symbol $profile($region) ]($style)"
[aws.region_aliases]
eu-central-1 = "eu-c1"
eu-west-1 = "eu-w1"
us-east-1 = "us-e1"

# GCloud
[gcloud]
symbol = "🔷"
style = "bg:#e67e22 fg:#1a1a2e"
format = "[ $symbol $project ]($style)"
disabled = true  # Enable if you use GCP

# =============================================================================
# Languages — purple segment (show only in project dirs)
# =============================================================================

[python]
symbol = "🐍"
style = "bg:#9b59b6 fg:#e0e0e0"
format = "[ $symbol $version( \\($virtualenv\\)) ]($style)"
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", "setup.py"]

[golang]
symbol = "🐹"
style = "bg:#9b59b6 fg:#e0e0e0"
format = "[ $symbol $version ]($style)"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

[nodejs]
symbol = ""
style = "bg:#9b59b6 fg:#e0e0e0"
format = "[ $symbol $version ]($style)"
detect_extensions = ["js", "ts"]
detect_files = ["package.json", ".node-version"]

[rust]
symbol = "🦀"
style = "bg:#9b59b6 fg:#e0e0e0"
format = "[ $symbol $version ]($style)"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

[java]
symbol = ""
style = "bg:#9b59b6 fg:#e0e0e0"
format = "[ $symbol $version ]($style)"
detect_extensions = ["java", "jar"]
detect_files = ["pom.xml", "build.gradle"]

[lua]
symbol = "🌙"
style = "bg:#9b59b6 fg:#e0e0e0"
format = "[ $symbol $version ]($style)"
detect_extensions = ["lua"]

# =============================================================================
# Status — red segment
# =============================================================================

# Command duration
[cmd_duration]
min_time = 2_000  # Show if command took > 2s
style = "bg:#c0392b fg:#e0e0e0"
format = "[ 󱎫 $duration ]($style)"

# Status (exit code)
[status]
disabled = false
style = "bg:#c0392b fg:#e0e0e0"
format = "[ $status ]($style)"

# =============================================================================
# Prompt
# =============================================================================

[character]
success_symbol = "[❯](bold #2ecc71)"
error_symbol = "[❯](bold #c0392b)"

[line_break]
disabled = false

# Disabled modules
[package]
disabled = true
