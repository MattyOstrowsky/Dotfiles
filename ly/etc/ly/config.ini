# =============================================================================
# ly config.ini — One Dark Theme
# =============================================================================
# Copy to: /etc/ly/config.ini
#   sudo cp ~/Dotfiles/ly/etc/ly/config.ini /etc/ly/config.ini
#   sudo cp ~/Dotfiles/ly/etc/ly/startup.sh /etc/ly/startup.sh
#   sudo chmod +x /etc/ly/startup.sh
#
# One Dark palette reference:
#   bg      #282c34 — dark blue-gray background
#   fg      #abb2bf — light text
#   accent  #56b6c2 — cyan accent
#   blue    #61afef — secondary accent
#   border  #5c6370 — muted border/comment
#   red     #e06c75 — error
#   green   #98c379 — success
# =============================================================================

# ── Appearance ───────────────────────────────────────────────────────────────
bg          = 0x00282c34    # one dark background
fg          = 0x00abb2bf    # one dark foreground
border_fg   = 0x005c6370    # one dark border/comment
error_fg    = 0x01e06c75    # one dark red, bold
error_bg    = 0x00282c34    # same as bg

blank_box         = true     # solid box background
hide_borders      = false    # keep borders, they're styled
hide_key_hints    = false    # show F1/F2 hints at bottom
hide_keyboard_locks = false  # show CAPS/NUM state
hide_version_string = true   # clean top-left, no version string

box_title         = null     # no title — minimalist
text_in_center    = true     # centered text in input box
input_len         = 26       # slightly shorter input fields
margin_box_h      = 2
margin_box_v      = 1
box_position_h    = 0.5
box_position_v    = 0.45

# ── Clock ────────────────────────────────────────────────────────────────────
clock       = "%a %d %b  %H:%M"    # Mon 04 Jun  13:37
bigclock    = none                 # disabled — too heavy for Nord

# ── Password ─────────────────────────────────────────────────────────────────
asterisk        = 0x2022       # • bullet point
clear_password  = true         # clear field on wrong password
allow_empty_password = true    # allow empty (for autologin setup)

# ── Animation — Matrix style with One Dark teal ──────────────────────────────────
animation              = matrix
animation_frame_delay  = 4
animation_timeout_sec  = 0           # run forever
cmatrix_fg             = 0x0056b6c2  # one dark cyan characters
cmatrix_head_col       = 0x01abb2bf  # one dark foreground head, bold
cmatrix_min_codepoint  = 0x21
cmatrix_max_codepoint  = 0x7B

# ── Input ────────────────────────────────────────────────────────────────────
default_input  = login       # start in username field
numlock        = false
full_color     = true        # 24-bit true color

# ── Sessions ─────────────────────────────────────────────────────────────────
shell      = false           # hide shell session from list
save       = true            # remember last session
vi_mode    = false

# ── Power keys ───────────────────────────────────────────────────────────────
shutdown_key   = F1
restart_key    = F2
sleep_key      = F3
# hibernate_key = F4          # uncomment if you use hibernation

shutdown_cmd = /sbin/shutdown $PLATFORM_SHUTDOWN_ARG now
restart_cmd  = /sbin/shutdown -r now

# ── Brightness keys ──────────────────────────────────────────────────────────
brightness_down_key = F5
brightness_up_key   = F6
brightness_down_cmd = $PREFIX_DIRECTORY/bin/brightnessctl -q -n s 10%-
brightness_up_cmd   = $PREFIX_DIRECTORY/bin/brightnessctl -q -n s +10%

# ── Startup script (sets TTY colors to Nord) ──────────────────────────────
start_cmd = $CONFIG_DIRECTORY/ly/startup.sh

# ── Logging ──────────────────────────────────────────────────────────────────
ly_log       = /var/log/ly.log
session_log  = .local/state/ly-session.log

# ── Paths ────────────────────────────────────────────────────────────────────
waylandsessions = $PREFIX_DIRECTORY/share/wayland-sessions
xsessions       = $PREFIX_DIRECTORY/share/xsessions
x_cmd           = $PREFIX_DIRECTORY/bin/X
xauth_cmd       = $PREFIX_DIRECTORY/bin/xauth
service_name    = ly
path            = /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
